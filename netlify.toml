[build]
  command = "npm run build"
  publish = "dist"

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

# ---------------------------------------------------------------------------
# Security headers
# ---------------------------------------------------------------------------
# CSP allows: same-origin everything, Supabase REST + Realtime websocket,
# Google Fonts, inline styles (Tailwind/runtime), inline scripts (Vite uses
# a small inline bootstrap), data:/blob: images for receipts and reference
# photos. Tighten further once you eliminate inline scripts.
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "camera=(self), microphone=(), geolocation=()"
    Strict-Transport-Security = "max-age=31536000; includeSubDomains"
    Content-Security-Policy = "default-src 'self'; connect-src 'self' https://*.supabase.co wss://*.supabase.co https://fonts.googleapis.com https://fonts.gstatic.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com data:; img-src 'self' data: blob: https:; script-src 'self' 'unsafe-inline'; manifest-src 'self'; worker-src 'self'; frame-ancestors 'none';"

# Service worker must never be cached so deploys reach users promptly.
[[headers]]
  for = "/sw.js"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"

# Manifest may be cached for a few minutes — it changes rarely.
[[headers]]
  for = "/manifest.webmanifest"
  [headers.values]
    Cache-Control = "public, max-age=300"
